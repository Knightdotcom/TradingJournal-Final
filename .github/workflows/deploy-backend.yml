name: Deploy Backend to Azure App Service

on:
  push:
    branches:
      - master
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore backend/TradingJournal.API/TradingJournal.API.csproj

      - name: Build
        run: dotnet build backend/TradingJournal.API/TradingJournal.API.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish backend/TradingJournal.API/TradingJournal.API.csproj --configuration Release --no-build --output ./publish

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'tradingjournal-api-knightdotcom'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish
